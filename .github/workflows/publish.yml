name: Publish

on:
  push:
    branches: [release]
    paths-ignore:
      - '**.md'
      - '.planning/**'
      - '.claude/**'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: publish-release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    name: Publish to Marketplace
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.actor != 'github-actions[bot]' && github.actor != 'story-point-release-bot[bot]'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Mint release-bot token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test -- --run
      - name: Build (production)
        run: npm run build
      - name: Bundle size gate (≤ 250 KB gzipped)
        run: npm run check:size

      - name: Verify all manifest assets exist on disk
        run: |
          set -euo pipefail
          MISSING=0
          while IFS= read -r path; do
            if [ ! -e "$path" ]; then
              echo "MISSING: $path"
              MISSING=1
            else
              echo "  ok: $path"
            fi
          done < <(jq -r '.files[].path' vss-extension.json)
          if [ "$MISSING" -ne 0 ]; then
            echo ""
            echo "FAIL: vss-extension.json files[] declares assets missing on disk."
            exit 1
          fi

      - name: Verify TFX_PAT secret resolves
        run: |
          echo "tfx-pat-present=${{ secrets.TFX_PAT != '' }}"

      - name: Probe release branch protection
        id: protection
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          BODY=$(gh api repos/${{ github.repository }}/branches/release/protection 2>&1)
          STATUS=$?
          set -e

          if [ "$STATUS" -eq 0 ]; then
            STATE=protected
            HEADLINE='release is **PROTECTED**. Commit-back/tag push relies on the App being on the bypass list.'
            LOG_PREFIX='Release IS branch-protected:'
          elif echo "$BODY" | grep -qi 'Branch not protected'; then
            STATE=not_protected
            HEADLINE='release is **NOT protected**. App-token `git push` (commit-back, tag) goes through directly.'
            LOG_PREFIX='Release is NOT branch-protected (HTTP 404):'
          else
            STATE=unknown
            HEADLINE='release branch-protection state could not be determined (token permission or transient error).'
            LOG_PREFIX="::warning::Release branch-protection probe inconclusive (gh api exit $STATUS, body did not match 'Branch not protected'):"
          fi

          echo "protected=${STATE}" >> "$GITHUB_OUTPUT"
          echo "$LOG_PREFIX"
          echo "$BODY"
          {
            echo "## Branch protection probe"
            echo "$HEADLINE"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Bump version (in-memory only)
        id: bump
        run: node scripts/bump-version.mjs

      - name: Package vsix
        run: |
          set -euo pipefail
          npx tfx extension create --manifest-globs vss-extension.json --output-path dist/
          VSIX=$(ls dist/*.vsix | head -1)
          SIZE_KB=$(du -k "$VSIX" | cut -f1)
          {
            echo "## Package"
            echo "Created \`$(basename "$VSIX")\` (${SIZE_KB} KB)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ steps.bump.outputs.next-version-bare }}
          path: dist/*.vsix
          retention-days: 90
          if-no-files-found: error

      - name: Publish to Marketplace
        env:
          TFX_PAT: ${{ secrets.TFX_PAT }}
        run: |
          set -euo pipefail
          npx tfx extension publish --vsix dist/*.vsix --auth-type pat --token "$TFX_PAT" --no-prompt --no-wait-validation
          {
            echo "## Publish"
            echo "Published \`v${{ steps.bump.outputs.next-version-bare }}\` to Marketplace"
            echo "https://marketplace.visualstudio.com/items?itemName=TsezariMshvenieradzeTfsAiReviewTask.story-point-calculator"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit version bump to release
        id: commit
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "chore(release): ${{ steps.bump.outputs.next-version }} [skip ci]"
          commit_user_name: "story-point-release-bot[bot]"
          commit_user_email: "story-point-release-bot[bot]@users.noreply.github.com"
          commit_author: "story-point-release-bot[bot] <story-point-release-bot[bot]@users.noreply.github.com>"
          file_pattern: "package.json vss-extension.json"

      - name: Surface commit-back result
        run: |
          {
            echo "## Commit-back"
            echo "Committed bump to release as \`${{ steps.commit.outputs.commit_hash }}\` ([skip ci])"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Tag release (best-effort, idempotent)
        id: tag
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          V="${{ steps.bump.outputs.next-version }}"
          if git rev-parse "$V" >/dev/null 2>&1; then
            echo "Tag $V already exists locally — skipping"
            {
              echo "## Tag"
              echo "Tag \`$V\` already exists — idempotent skip per TAG-04"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          if git ls-remote --tags origin "$V" | grep -q "$V"; then
            echo "Tag $V already exists on origin — skipping"
            {
              echo "## Tag"
              echo "Tag \`$V\` already exists — idempotent skip per TAG-04"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          # Annotated tags need a committer identity; the git-auto-commit-action
          # step above sets its identity inline (-c user.*) and doesn't persist it,
          # so configure one here explicitly (fixes "fatal: empty ident name").
          git config user.name "story-point-release-bot[bot]"
          git config user.email "story-point-release-bot[bot]@users.noreply.github.com"
          git tag -a "$V" -m "Release $V"
          git push origin "$V"
          {
            echo "## Tag"
            echo "🏷️ Tagged \`$V\` (annotated, pushed to origin)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Surface tag failure (workflow stays green per TAG-04)
        if: failure() && steps.tag.outcome == 'failure'
        run: |
          V_BARE="${{ steps.bump.outputs.next-version-bare }}"
          {
            echo "## Tag"
            echo "⚠️ Tag step failed (workflow stays green per TAG-04 best-effort)."
            echo "Recovery: \`git tag -a v${V_BARE} -m 'Release v${V_BARE}' && git push origin v${V_BARE}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Open release -> master back-merge PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          V="${{ steps.bump.outputs.next-version }}"
          OPEN=$(gh pr list --base master --head release --state open --json number --jq 'length')
          if [ "$OPEN" != "0" ]; then
            echo "A release -> master PR is already open — skipping (it auto-updates with the new bump)."
            {
              echo "## Back-merge PR"
              echo "An existing \`release -> master\` PR auto-updated to carry \`$V\`."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          gh pr create --base master --head release \
            --title "chore(release): $V" \
            --body "Automated back-merge of the version bump from the publish workflow. Merge this via the GitHub Web UI — the merge commit's verified signature satisfies master's signed-commits rule. See .planning/OPERATIONS.md section 3."
          {
            echo "## Back-merge PR"
            echo "Opened \`release -> master\` PR carrying \`$V\` — merge it via the Web UI."
          } >> "$GITHUB_STEP_SUMMARY"
