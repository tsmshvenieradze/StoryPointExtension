name: Publish

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - '.planning/**'
      - '.claude/**'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: publish-master
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    name: Publish to Marketplace
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test -- --run
      - name: Build (production)
        run: npm run build
      - name: Bundle size gate (≤ 250 KB gzipped)
        run: npm run check:size

      - name: Verify all manifest assets exist on disk
        run: |
          set -euo pipefail
          MISSING=0
          while IFS= read -r path; do
            if [ ! -e "$path" ]; then
              echo "MISSING: $path"
              MISSING=1
            else
              echo "  ok: $path"
            fi
          done < <(jq -r '.files[].path' vss-extension.json)
          if [ "$MISSING" -ne 0 ]; then
            echo ""
            echo "FAIL: vss-extension.json files[] declares assets missing on disk."
            exit 1
          fi

      - name: Verify TFX_PAT secret resolves
        run: |
          echo "tfx-pat-present=${{ secrets.TFX_PAT != '' }}"

      - name: Probe master branch protection
        id: protection
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          BODY=$(gh api repos/${{ github.repository }}/branches/master/protection 2>&1)
          STATUS=$?
          set -e

          # Classify the response. The branches/protection endpoint requires
          # repo-admin scope, which GITHUB_TOKEN cannot be granted via the
          # workflow `permissions:` block (no `administration` scope exists
          # there). So this probe is best-effort: it gives a definitive
          # answer when the token is admin-scoped (e.g., via a custom PAT
          # if ever added) or when the response shape is unambiguous; it
          # honestly reports "unknown" when the token simply lacks scope.
          # 06-03 Task 3 captures the developer-side probe as the durable
          # source-of-truth artifact.
          if [ "$STATUS" -eq 0 ]; then
            STATE=protected
            HEADLINE='master is **PROTECTED**. P7 commit-back must use App or PAT bypass.'
            LOG_PREFIX='Master IS branch-protected:'
          elif echo "$BODY" | grep -qi 'Branch not protected'; then
            STATE=not_protected
            HEADLINE='master is **NOT protected**. P7 commit-back can use `GITHUB_TOKEN`.'
            LOG_PREFIX='Master is NOT branch-protected (HTTP 404):'
          else
            STATE=unknown
            HEADLINE='Branch-protection state could not be determined (token permission or transient error). P7 must re-probe with an admin-scoped token before deciding commit-back strategy.'
            LOG_PREFIX="::warning::Branch-protection probe inconclusive (gh api exit $STATUS, body did not match 'Branch not protected'):"
          fi

          echo "protected=${STATE}" >> "$GITHUB_OUTPUT"
          echo "$LOG_PREFIX"
          echo "$BODY"
          {
            echo "## Branch protection probe"
            echo "$HEADLINE"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Bump version (in-memory only)
        id: bump
        run: node scripts/bump-version.mjs

      - name: Package vsix
        run: |
          set -euo pipefail
          npx tfx extension create --manifest-globs vss-extension.json --output-path dist/
          VSIX=$(ls dist/*.vsix | head -1)
          SIZE_KB=$(du -k "$VSIX" | cut -f1)
          {
            echo "## Package"
            echo "Created \`$(basename "$VSIX")\` (${SIZE_KB} KB)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ steps.bump.outputs.next-version-bare }}
          path: dist/*.vsix
          retention-days: 90
          if-no-files-found: error

      - name: Publish to Marketplace
        env:
          TFX_PAT: ${{ secrets.TFX_PAT }}
        run: |
          set -euo pipefail
          npx tfx extension publish --vsix dist/*.vsix --auth-type pat --token "$TFX_PAT" --no-prompt --no-wait-validation
          {
            echo "## Publish"
            echo "Published \`v${{ steps.bump.outputs.next-version-bare }}\` to Marketplace"
            echo "https://marketplace.visualstudio.com/items?itemName=TsezariMshvenieradzeTfsAiReviewTask.story-point-calculator"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit version bump
        id: commit
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "chore(release): ${{ steps.bump.outputs.next-version }} [skip ci]"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          file_pattern: "package.json vss-extension.json"

      - name: Surface commit-back result
        run: |
          {
            echo "## Commit-back"
            echo "Committed bump as \`${{ steps.commit.outputs.commit_hash }}\` ([skip ci])"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Tag release (best-effort, idempotent)
        id: tag
        continue-on-error: true
        run: |
          set -euo pipefail
          V="${{ steps.bump.outputs.next-version }}"
          if git rev-parse "$V" >/dev/null 2>&1; then
            echo "Tag $V already exists locally — skipping"
            {
              echo "## Tag"
              echo "Tag \`$V\` already exists — idempotent skip per TAG-04"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          if git ls-remote --tags origin "$V" | grep -q "$V"; then
            echo "Tag $V already exists on origin — skipping"
            {
              echo "## Tag"
              echo "Tag \`$V\` already exists — idempotent skip per TAG-04"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          git tag -a "$V" -m "Release $V"
          git push origin "$V"
          {
            echo "## Tag"
            echo "🏷️ Tagged \`$V\` (annotated, pushed to origin)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Surface tag failure (workflow stays green per TAG-04)
        if: failure() && steps.tag.outcome == 'failure'
        run: |
          V_BARE="${{ steps.bump.outputs.next-version-bare }}"
          {
            echo "## Tag"
            echo "⚠️ Tag step failed (workflow stays green per TAG-04 best-effort)."
            echo "Recovery: \`git tag -a v${V_BARE} -m 'Release v${V_BARE}' && git push origin v${V_BARE}\`"
          } >> "$GITHUB_STEP_SUMMARY"
