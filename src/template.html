<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Story Point Calculator</title>
  <style>
    /* 03-04 cezari finding: without width:100% on the document, body.scrollWidth
       collapses to the natural width of the rendered content (Surface > Page),
       leaving the iframe occupying only the left half of the host dialog.
       Make the document fully fill the iframe so flex-grow children expand to
       the host-allocated width. */
    html, body, #root {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    /* v1.0.6 (260504-cl1 follow-up): the addDialog host renderer (CornerDialog
       / CustomDialog) does NOT add the side gutter that the openCustomDialog
       external-content renderer did in v1.0.0..v1.0.4, so the iframe content
       sat flush against both vertical edges of the dialog. Compensate inside
       the iframe with the standard ADO 24px horizontal inset. box-sizing
       border-box keeps the iframe's width allocation intact; ResizeObserver
       still feeds document.body.scrollHeight back to SDK.resize so the dialog
       grows to fit. Vertical padding stays 0 — the host renders the title
       strip above us and the dialog frame already includes bottom whitespace.

       v1.0.7: !important is required. azure-devops-ui/Core/override.css line 28
       declares `body { padding: 0; margin: 0; display: flex }` and is injected
       at runtime by style-loader AFTER this <style> block, so without the
       priority bump it wins specificity (same selector weight, later wins) and
       zeroes the gutter. v1.0.6 cezari verification (uninstall+reinstall+hard
       refresh) confirmed the rule was present in DOM but overridden in
       computed styles. Don't drop the !important — that was the actual fix. */
    body {
      padding: 0 24px !important;
    }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
